<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #08080f; }

  .slide {
    width: 1080px;
    height: 1080px;
    background: linear-gradient(135deg, #08080f 0%, #0f0f1f 50%, #080814 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', sans-serif;
  }

  /* Ripple circles from center-top coin */
  .ripple {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(255,220,80,0.15);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* Big coin */
  .coin-wrap {
    position: relative;
    z-index: 10;
    margin-bottom: 60px;
  }
  .coin-big {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff8a0, #f5c400 45%, #c08a00 75%, #8a5e00);
    box-shadow:
      0 0 80px rgba(245,196,0,0.5),
      0 0 160px rgba(245,196,0,0.2),
      inset 0 -10px 30px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .coin-big::before {
    content: '$';
    font-size: 100px;
    font-weight: 900;
    color: rgba(180,120,0,0.6);
    line-height: 1;
  }
  /* coin edge ring */
  .coin-big::after {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    border: 3px solid rgba(255,240,150,0.4);
  }

  /* Main text */
  .main-text {
    position: relative;
    z-index: 10;
    text-align: center;
  }
  .main-text .top {
    font-size: 28px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 6px;
    text-transform: uppercase;
    font-weight: 300;
    margin-bottom: 20px;
  }
  .main-text h1 {
    font-size: 80px;
    font-weight: 800;
    color: #fff;
    line-height: 1.05;
  }
  .main-text h1 .gold {
    color: #f5c400;
    text-shadow: 0 0 40px rgba(245,196,0,0.4);
  }
  .main-text .sub {
    margin-top: 24px;
    font-size: 32px;
    color: rgba(255,255,255,0.35);
    font-weight: 300;
    letter-spacing: 1px;
    line-height: 1.5;
  }

  .brand {
    position: absolute;
    bottom: 48px;
    right: 60px;
    font-size: 26px;
    font-weight: 700;
    color: rgba(255,255,255,0.12);
    letter-spacing: 2px;
  }
  .brand span { color: rgba(245,196,0,0.35); }
</style>
</head>
<body>
<div class="slide">

  <!-- Ripples -->
  <div class="ripple" style="width:320px;height:320px;"></div>
  <div class="ripple" style="width:500px;height:500px;opacity:0.7;"></div>
  <div class="ripple" style="width:700px;height:700px;opacity:0.4;"></div>
  <div class="ripple" style="width:900px;height:900px;opacity:0.2;"></div>

  <div class="coin-wrap">
    <div class="coin-big"></div>
  </div>

  <div class="main-text">
    <div class="top">The moment everything shifts</div>
    <h1>Your first<br><span class="gold">dividend dollar</span><br>changes you.</h1>
    <div class="sub">Not because it's a lot.<br>Because now you know it's possible.</div>
  </div>

  <div class="brand">div<span>sprout</span>.com</div>
</div>
</body>
</html>
