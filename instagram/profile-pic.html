<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DivSprout — Profile Picture</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #040507;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 32px;
    font-family: sans-serif;
  }

  .label {
    color: #4a5568;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: monospace;
  }

  /* ── Dark background version (primary) ── */
  .frame {
    width: 500px;
    height: 500px;
    background: #0a0b0d;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* Ambient glow layers */
  .glow-main {
    position: absolute;
    width: 340px; height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(34,212,122,0.22) 0%, transparent 65%);
    pointer-events: none;
  }
  .glow-outer {
    position: absolute;
    width: 460px; height: 460px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(34,212,122,0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .icon-wrap {
    position: relative;
    z-index: 2;
    width: 220px;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .icon-wrap svg {
    width: 100%;
    height: 100%;
    filter: drop-shadow(0 0 18px rgba(34,212,122,0.55)) drop-shadow(0 0 40px rgba(34,212,122,0.25));
  }

  /* ── Round version preview ── */
  .frame-round {
    width: 500px;
    height: 500px;
    background: #0a0b0d;
    border-radius: 50%;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  /* ── Green background version ── */
  .frame-green {
    width: 500px;
    height: 500px;
    background: #22d47a;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .frame-green .icon-wrap svg {
    filter: none;
  }
  .frame-green .icon-wrap svg path,
  .frame-green .icon-wrap svg line {
    stroke: #0a0b0d;
  }
  .glow-green-inner {
    position: absolute;
    width: 340px; height: 340px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,0.18) 0%, transparent 65%);
    pointer-events: none;
  }
</style>
</head>
<body>

<!-- Version 1: Dark + glow (odporúčam) -->
<div class="label">Verzia 1 — Tmavá s glow efektom (odporúčam)</div>
<div class="frame slide">
  <div class="glow-outer"></div>
  <div class="glow-main"></div>
  <div class="icon-wrap">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 88C50 88 18 62 18 37.5C18 23.4 32.8 14 50 14C67.2 14 82 23.4 82 37.5C82 62 50 88 50 88Z"
        stroke="#22d47a" stroke-width="5" stroke-linejoin="round" fill="none"/>
      <line x1="50" y1="88" x2="50" y2="48" stroke="#22d47a" stroke-width="5" stroke-linecap="round"/>
      <line x1="50" y1="60" x2="37" y2="72" stroke="#22d47a" stroke-width="5" stroke-linecap="round"/>
      <line x1="50" y1="60" x2="63" y2="72" stroke="#22d47a" stroke-width="5" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<!-- Version 2: Round preview (ako vyzerá na IG) -->
<div class="label">Verzia 1 — ako vyzerá na Instagrame (kruh)</div>
<div class="frame-round slide">
  <div class="glow-outer"></div>
  <div class="glow-main"></div>
  <div class="icon-wrap">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 88C50 88 18 62 18 37.5C18 23.4 32.8 14 50 14C67.2 14 82 23.4 82 37.5C82 62 50 88 50 88Z"
        stroke="#22d47a" stroke-width="5" stroke-linejoin="round" fill="none"/>
      <line x1="50" y1="88" x2="50" y2="48" stroke="#22d47a" stroke-width="5" stroke-linecap="round"/>
      <line x1="50" y1="60" x2="37" y2="72" stroke="#22d47a" stroke-width="5" stroke-linecap="round"/>
      <line x1="50" y1="60" x2="63" y2="72" stroke="#22d47a" stroke-width="5" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<!-- Version 3: Green background -->
<div class="label">Verzia 2 — Zelené pozadie</div>
<div class="frame-green slide">
  <div class="glow-green-inner"></div>
  <div class="icon-wrap">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 88C50 88 18 62 18 37.5C18 23.4 32.8 14 50 14C67.2 14 82 23.4 82 37.5C82 62 50 88 50 88Z"
        stroke="#0a0b0d" stroke-width="5" stroke-linejoin="round" fill="none"/>
      <line x1="50" y1="88" x2="50" y2="48" stroke="#0a0b0d" stroke-width="5" stroke-linecap="round"/>
      <line x1="50" y1="60" x2="37" y2="72" stroke="#0a0b0d" stroke-width="5" stroke-linecap="round"/>
      <line x1="50" y1="60" x2="63" y2="72" stroke="#0a0b0d" stroke-width="5" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<!-- Version 4: Green background round -->
<div class="label">Verzia 2 — ako vyzerá na Instagrame (kruh)</div>
<div class="frame-round slide" style="background: #22d47a;">
  <div class="glow-green-inner"></div>
  <div class="icon-wrap">
    <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 88C50 88 18 62 18 37.5C18 23.4 32.8 14 50 14C67.2 14 82 23.4 82 37.5C82 62 50 88 50 88Z"
        stroke="#0a0b0d" stroke-width="5" stroke-linejoin="round" fill="none"/>
      <line x1="50" y1="88" x2="50" y2="48" stroke="#0a0b0d" stroke-width="5" stroke-linecap="round"/>
      <line x1="50" y1="60" x2="37" y2="72" stroke="#0a0b0d" stroke-width="5" stroke-linecap="round"/>
      <line x1="50" y1="60" x2="63" y2="72" stroke="#0a0b0d" stroke-width="5" stroke-linecap="round"/>
    </svg>
  </div>
</div>

</body>
</html>
